<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="theme-color" content="#0a0e0a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f4f1e9" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/terminal.css' | relative_url }}">
  {% seo %}
  {% include analytics.html %}
</head>
<body data-effects="on">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-title">{{ site.title }}</span><span class="cursor" aria-hidden="true">█</span>
      </a>
      <p class="tagline">{{ site.tagline | replace: 'asm', '<span class="asm">asm</span>' }}</p>

      <nav class="site-nav" aria-label="Tracks">
        {% for t in site.data.tracks.list %}
        <a href="{{ '/' | relative_url }}#{{ t.id }}"><span class="ico" aria-hidden="true">{{ t.icon }}</span> {{ t.title }}</a>
        {% endfor %}
        <button id="effects-toggle" class="ghost" type="button" aria-pressed="true"
                title="Toggle CRT effects">CRT: on</button>
      </nav>
    </div>
  </header>

  <main id="main" class="wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <span class="prompt">demistify@asm</span>:<span class="path">~</span>$
      <span class="muted">built with Jekyll · hand-traced, no real CPUs were harmed</span>
    </div>
  </footer>

  <script src="{{ '/assets/js/effects.js' | relative_url }}" defer></script>
</body>
</html>
