title: "Demystifying Assembly"
tagline: "Mind the ch·asm between you and the machine."
description: >-
  An interactive, beginner-to-advanced guide to assembly language —
  the history of how it evolved, and hands-on RISC-V you can step through
  instruction by instruction.
lang: en

# Custom domain served at the apex, so the site lives at the root (no baseurl).
# url is needed here so SEO tags and the sitemap get an absolute address.
url: "https://demistify-asm.com"
baseurl: ""

# Google Analytics 4 Measurement ID (e.g. G-XXXXXXXXXX).
# Leave blank to disable. Only loads in production builds.
google_analytics: "G-Z15GW8CSDX"

# --- Collections: each learning track is a collection ---
collections:
  history:
    output: true
    permalink: /history/:name/
  code:
    output: true
    permalink: /code/:name/

defaults:
  - scope: { path: "", type: "history" }
    values: { layout: "lesson", track: "history" }
  - scope: { path: "", type: "code" }
    values: { layout: "lesson", track: "code" }

# --- Markdown / syntax highlighting ---
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  input: GFM

# --- Privacy: keep internal docs out of the build ---
# (the leading underscore on _internal/ already makes Jekyll skip it; this is belt + suspenders)
exclude:
  - _internal/
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - .gitignore

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
